apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app-nonprod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CenturionB6/Pipeline.git
    targetRevision: main
    path: gcp-platform-infra/apps/sample-app/overlays/nonprod
  destination:
    server: https://kubernetes.default.svc
    namespace: nonprod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
