apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: pg-cluster
  namespace: data
spec:
  terminationPolicy: Delete
  clusterDef: postgresql
  topology: replication
  componentSpecs:
    - name: postgresql
      serviceVersion: "14.7.2"
      disableExporter: false
      replicas: 1
      resources:
        limits:
          cpu: "500m"
          memory: "768Mi"
        requests:
          cpu: "250m"
          memory: "512Mi"
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: local-path
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 30Gi
